<!DOCTYPE html>
<html>
<head>

<style>

body{
font-family:Arial;
background:#0b1120;
color:white;
padding:30px
}

table{
width:100%;
border-collapse:collapse
}

td,th{
border:1px solid #333;
padding:10px
}

</style>

</head>

<body>

<h1>Panel Admin</h1>

<table>

<thead>

<tr>
<th>ID</th>
<th>Sorteo</th>
<th>Participantes</th>
<th>Asignaciones</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

<script>

google.script.run
.withSuccessHandler(function(data){

let html=""

data.forEach(s=>{

html+=`
<tr>
<td>${s.id}</td>
<td>${s.nombre}</td>
<td>${s.participantes.length}</td>
<td>${s.asignaciones.length}</td>
</tr>
`

})

document.getElementById("tabla").innerHTML=html

})
.adminSorteos()

</script>

</body>
</html>
